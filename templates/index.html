<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法律维权助手 · AI 智能咨询</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-brand">
                <div class="brand-icon">⚖</div>
                <div class="brand-text">
                    <h1>法律维权助手</h1>
                    <p class="subtitle">消费者权益保护 · AI 智能咨询</p>
                </div>
            </div>
            <div class="header-actions">
                <span class="header-badge">智谱 GLM 驱动</span>
                <button class="mobile-sidebar-toggle" id="sidebar-toggle" aria-label="切换侧边栏">☰</button>
            </div>
        </header>

        <div class="main-content">
            <!-- Chat Area (toggled with doc-form-container) -->
            <div class="chat-container" id="chat-container">
                <!-- Quick Actions -->
                <div class="quick-actions" id="quick-actions">
                    <p class="quick-label">选择纠纷类型</p>
                    <div class="quick-buttons">
                        <button class="quick-btn" data-type="product_quality">商品质量</button>
                        <button class="quick-btn" data-type="false_advertising">虚假宣传</button>
                        <button class="quick-btn" data-type="refund_dispute">退款纠纷</button>
                        <button class="quick-btn" data-type="food_safety">食品安全</button>
                        <button class="quick-btn" data-type="service_quality">服务质量</button>
                    </div>
                </div>

                <!-- Messages -->
                <div class="chat-messages" id="chat-messages">
                    <div class="loading-indicator" id="loading">
                        <div class="loading-icon"></div>
                        <p>正在连接法律助手...</p>
                    </div>
                </div>

                <!-- Input -->
                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <textarea
                            id="user-input"
                            placeholder="请描述您遇到的消费纠纷问题..."
                            rows="1"
                            disabled
                        ></textarea>
                        <button id="send-btn" disabled>发送</button>
                    </div>
                    <p class="disclaimer">AI 法律助手仅供参考，不构成正式法律意见。复杂案件建议咨询专业律师。</p>
                </div>
            </div>

            <!-- Document Form View (hidden by default) -->
            <div class="doc-form-container" id="doc-form-container" style="display:none;">
                <div class="doc-form-inner">
                    <div class="doc-form-header">
                        <h2 id="doc-form-title"></h2>
                        <p id="doc-form-desc" class="doc-form-description"></p>
                    </div>
                    <form id="doc-form" class="doc-form">
                        <div id="doc-form-fields" class="doc-form-fields"></div>
                        <div class="doc-form-group">
                            <label for="doc-form-description">情况描述</label>
                            <textarea id="doc-form-description" rows="5" placeholder="请详细描述您遇到的问题、经过和诉求..."></textarea>
                        </div>
                        <div class="doc-form-actions">
                            <button type="submit" class="doc-form-submit" id="doc-form-submit">生成文书</button>
                        </div>
                    </form>
                    <div id="doc-form-result" class="doc-form-result" style="display:none;"></div>
                </div>
            </div>

            <!-- Sidebar Overlay (mobile) -->
            <div class="sidebar-overlay" id="sidebar-overlay"></div>

            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-section">
                    <h3>功能导航</h3>
                    <div class="sidebar-nav">
                        <button class="sidebar-nav-btn active" id="nav-chat">智能咨询</button>
                        <button class="sidebar-nav-btn" id="nav-docs">文书工具</button>
                    </div>
                </div>
                <div class="sidebar-section" id="doc-tool-section" style="display:none;">
                    <h3>选择文书类型</h3>
                    <div id="doc-tool-buttons" class="doc-tool-buttons"></div>
                </div>
                <div class="sidebar-section" id="sidebar-case-info">
                    <h3>案件信息</h3>
                    <div id="case-info-panel" class="case-info-panel">
                        <p class="placeholder-text">暂无信息，请先描述您的问题</p>
                    </div>
                </div>
                <div class="sidebar-section" id="sidebar-docs">
                    <h3>已生成文书</h3>
                    <div id="docs-panel" class="docs-panel">
                        <p class="placeholder-text">暂未生成文书</p>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
