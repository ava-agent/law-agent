<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法律维权助手</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>法律维权助手</h1>
            <p class="subtitle">消费者权益保护 · AI 智能咨询</p>
        </header>

        <div class="main-content">
            <!-- Chat Area -->
            <div class="chat-container">
                <!-- Quick Actions -->
                <div class="quick-actions" id="quick-actions">
                    <p class="quick-label">快速选择纠纷类型：</p>
                    <div class="quick-buttons">
                        <button class="quick-btn" data-type="product_quality">商品质量</button>
                        <button class="quick-btn" data-type="false_advertising">虚假宣传</button>
                        <button class="quick-btn" data-type="refund_dispute">退款纠纷</button>
                        <button class="quick-btn" data-type="food_safety">食品安全</button>
                        <button class="quick-btn" data-type="service_quality">服务质量</button>
                    </div>
                </div>

                <!-- Messages -->
                <div class="chat-messages" id="chat-messages">
                    <div class="loading-indicator" id="loading">
                        <div class="typing-dots">
                            <span></span><span></span><span></span>
                        </div>
                        <p>正在连接助手...</p>
                    </div>
                </div>

                <!-- Input -->
                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <textarea
                            id="user-input"
                            placeholder="请描述您遇到的消费纠纷问题..."
                            rows="1"
                            disabled
                        ></textarea>
                        <button id="send-btn" disabled>发送</button>
                    </div>
                    <p class="disclaimer">AI 法律助手仅供参考，不构成正式法律意见。复杂案件建议咨询专业律师。</p>
                </div>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-section">
                    <h3>案件信息</h3>
                    <div id="case-info-panel" class="case-info-panel">
                        <p class="placeholder-text">暂无信息，请先描述您的问题</p>
                    </div>
                </div>
                <div class="sidebar-section">
                    <h3>已生成文书</h3>
                    <div id="docs-panel" class="docs-panel">
                        <p class="placeholder-text">暂未生成文书</p>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
